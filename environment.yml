name: torch_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy=2.2.5
  - pandas=2.3.3
  - scipy=1.15.3
  - h5py=3.15.1
  - matplotlib=3.10.7
  - scikit-learn=1.7.2
  - ipykernel=7.1.0
  - jupyter_client=8.6.3
  - seaborn=0.13.2
  - tqdm=4.67.1
  - pip:
    # PyTorch with CUDA 11.8 — install separately if conda create is slow:
    #   pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
    - torch==2.7.1+cu118
    - torchvision==0.22.1+cu118
    - torchaudio==2.7.1+cu118
    - transformers==4.57.1
    - datasets==4.4.1
    - huggingface-hub==1.2.3
