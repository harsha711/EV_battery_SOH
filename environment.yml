name: torch_env
channels:
    - pytorch
    - nvidia
    - conda-forge
    - defaults
dependencies:
    - python=3.11
    - pip:
          - torch==2.6.0+cu118
          - torchvision==0.21.0+cu118
          - torchaudio==2.6.0+cu118
          - --index-url https://download.pytorch.org/whl/cu118
          - numpy
          - pandas
          - scipy
          - h5py
          - matplotlib
          - scikit-learn
          - ipykernel
          - jupyter_client
          - seaborn
          - tqdm
